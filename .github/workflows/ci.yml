name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cplatform
          POSTGRES_PASSWORD: cplatform
          POSTGRES_DB: cplatform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cplatform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://cplatform:cplatform@localhost:5432/cplatform
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci-test-session-secret-at-least-32-chars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck

      - name: Generate Prisma client
        run: npm run prisma:generate -w @cplatform/db --if-present

      - name: Run migrations
        run: npm run prisma:migrate:deploy -w @cplatform/db --if-present

      - name: Unit + fairness tests
        run: npm run test

      - name: Build
        run: npm run build
